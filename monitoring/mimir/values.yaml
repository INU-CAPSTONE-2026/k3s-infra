# 실제 S3를 사용하기에 내장 MinIO 비활성화 
minio:
  enabled: false

# S3 연동
mimir:
  structuredConfig:
    common:
      storage:
        backend: s3
        s3:
          endpoint: s3.ap-northeast-2.amazonaws.com
          region: ap-northeast-2
          bucket_name: k3s-mimir-storage
          access_key_id: ${AWS_ACCESS_KEY_ID}
          secret_access_key: ${AWS_SECRET_ACCESS_KEY}
    ingester:
      ring:
        replication_factor: 1
    # OTel resource attribute를 메트릭 레이블로 승격
    limits:
      # host.name 등 resource attribute를 메트릭 레이블로 변환
      # 미설정 시 host_name="local-db" 같은 레이블이 메트릭에 붙지 않음
      promote_otel_resource_attributes: "host.name, os.type, service.name, service.instance.id"
      otel_keep_identifying_resource_attributes: true

# 모든 Pod에 Secret 명시적으로 주입
global:
  extraEnv:
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: mimir-s3-secret
          key: access_key_id
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: mimir-s3-secret
          key: secret_access_key

# 자원 절약을 위한 replicas 축소
ingester:
  replicas: 1
  zoneAwareReplication:
    enabled: false

store_gateway:
  replicas: 1
  zoneAwareReplication:
    enabled: false

distributor:
  replicas: 1

querier:
  replicas: 1

query_frontend:
  replicas: 1

query_scheduler:
  replicas: 1

compactor:
  replicas: 1

# 알림 관련 비활성화 (추후 DR 알림 구성 시 활성화)
alertmanager:
  enabled: false

ruler:
  enabled: false

overrides_exporter:
  enabled: false