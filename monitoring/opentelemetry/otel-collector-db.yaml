receivers:
  hostmetrics:
    root_path: /
    collection_interval: 10s
    scrapers:
      cpu: {}
      memory: {}
      load: {}
      disk: {}
      network: {}
  postgresql:
    endpoint: localhost:5432
    username: otel_user
    password: otel
    databases:
      - postgres
    collection_interval: 10s
    tls:
      insecure: true
  filelog:
    include:
      - /var/log/postgresql/*.log

processors:
  memory_limiter:
    check_interval: 1s
    limit_percentage: 75
    spike_limit_percentage: 15
  batch:
    send_batch_size: 1000
    timeout: 5s
  resourcedetection:
    detectors: [env, system]
  resource:
    attributes:
      - key: service.name
        value: postgresql
        action: upsert

exporters:
  otlphttp/mimir:
    endpoint: http://100.70.65.91:32743/otlp
    tls:
      insecure: true
  otlphttp/loki:
    endpoint: http://100.70.65.91:31731/otlp
    tls:
      insecure: true

service:
  pipelines:
    metrics/hostmetrics:
      receivers: [hostmetrics]
      processors: [memory_limiter, batch, resourcedetection]
      exporters: [otlphttp/mimir]
    metrics/postgresql:
      receivers: [postgresql]
      processors: [memory_limiter, batch, resourcedetection]
      exporters: [otlphttp/mimir]
    logs:
      receivers: [filelog]
      processors: [memory_limiter, batch, resourcedetection, resource]
      exporters: [otlphttp/loki]