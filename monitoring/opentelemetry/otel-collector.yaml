apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel-collector
  namespace: monitoring
spec:
  mode: daemonset
  env:
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: aws-kinesis-secret
          key: access_key_id
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: aws-kinesis-secret
          key: secret_access_key
  volumeMounts:
    - mountPath: /var/log
      name: varlog
      readOnly: true
    # [추가] hostmetrics 수집을 위한 노드 파일시스템 마운트
    - mountPath: /hostfs
      name: hostfs
      readOnly: true
  volumes:
    - hostPath:
        path: /var/log
      name: varlog
    # [추가] hostmetrics 수집을 위한 노드 파일시스템
    - hostPath:
        path: /
      name: hostfs
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      filelog:
        include:
          - /var/log/pods/*/*/*.log
        exclude:
          - /var/log/pods/monitoring_otel-collector*/*/*.log
        start_at: end
        include_file_path: true
      # [추가] 노드 인프라 메트릭 수집
      hostmetrics:
        root_path: /hostfs
        collection_interval: 10s
        scrapers:
          cpu: {}
          memory: {}
          load: {}
          disk: {}
          network: {}

    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 15
      batch:
        send_batch_size: 1000
        send_batch_max_size: 1500
        timeout: 5s
      resourcedetection:
        detectors: [env, system]
      resource:
        attributes:
          - key: host.name
            value: "${K8S_NODE_NAME}"
            action: upsert

    exporters:
      awskinesis:
        stream_name: prod-db-log-stream
        region: ap-northeast-2
        aws:
          access_key: ${env:AWS_ACCESS_KEY_ID}
          secret_key: ${env:AWS_SECRET_ACCESS_KEY}
      otlphttp/loki:
        endpoint: http://loki-gateway.monitoring.svc.cluster.local/otlp
        tls:
          insecure: true
      # [추가] Mimir로 메트릭 전송
      prometheusremotewrite:
        endpoint: http://mimir-gateway.monitoring.svc:80/api/v1/push
        tls:
          insecure: true
        resource_to_telemetry_conversion:
          enabled: true

    service:
      pipelines:
        logs:
          receivers: [otlp, filelog]
          processors: [memory_limiter, batch, resourcedetection]
          exporters: [otlphttp/loki, awskinesis]
        # [추가] 메트릭 수집 파이프라인
        metrics:
          receivers: [otlp, hostmetrics]
          processors: [memory_limiter, batch, resourcedetection]
          exporters: [prometheusremotewrite]